<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"content="width=device-width,initial-scale=1.0"/>
    <title>My Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    
<div class="card">
    <div class="navbar">
        <h1 class="text">My orders</h1>
        
        <div class="user-tag">
            <img src="images/hijab image.png" class="image">
            <h1 class="name">Zara O</h1>
        </div>
    </div>

    <div class="item-cart">
        <img src="images/chocolate filled donuts.png"class="cart-image">
        <div class="description">
            <h5 class="text3">Name: Chocolate Filled Donuts</h5>
            <h5 class="text3">Descr: Chocolate Filled Donuts</h5>
            <h5 class="text3"></h5>Quantity:  - 2 +</h5>
            <h5 class="text3">Price: $36</h5>
        </div>
    </div>
    <div class="item-cart">
        <img src="images/strawberry flavor.png"class="cart-image">
        <div class="description">
            <h5 class="text3">Name: Strawberry Ice Cream</h5>
            <h5 class="text3">Descr: Rich Strawberry Flavoured Ice Cream</h5>
            <h5 class="text3">Quantity:  - 2 +</h5>
            <h5 class="text3">Price: $250</h5>
        </div>
    </div>
    <div class="total">
        <div class="total2">
            <p>Total:  $286</p>
            <button class="button">Checkout</button>
        </div>
    </div>
</div>





<script src="js/cart.js"></script>
</body>
</html>
